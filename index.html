<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Email Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #e2ddd6;
    --border-strong: #c8c2b8;
    --accent: #0f6fff;
    --accent-light: #e8f0ff;
    --text: #1a1814;
    --muted: #7a7570;
    --subtle: #b5b0a8;
    --yes-bg: #edfaf4;
    --yes-border: #2db87a;
    --yes-text: #0d5e3a;
    --no-bg: #fff0ee;
    --no-border: #e8533a;
    --no-text: #7a1f12;
    --success: #2db87a;
    --step-bg: #f0ece6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 14px; height: 14px; fill: white; }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .topbar-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--step-bg);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  /* Hero */
  .hero {
    margin-bottom: 48px;
    animation: fadeUp 0.5s ease both;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.08;
    color: var(--text);
    margin-bottom: 16px;
    font-weight: 400;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .hero-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 480px;
  }

  /* Progress bar */
  .progress-section {
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .progress-count {
    font-size: 11px;
    color: var(--muted);
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Content grid */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
    align-items: start;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  @media (max-width: 760px) {
    .content-grid { grid-template-columns: 1fr; }
    .main { padding: 32px 20px 60px; }
    .topbar { padding: 0 20px; }
  }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    position: sticky;
    top: 80px;
  }

  .q-num {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--subtle);
    margin-bottom: 10px;
  }

  .q-text {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* Yes/No */
  .yn-row { display: flex; gap: 10px; }

  .yn-btn {
    flex: 1;
    padding: 14px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .yn-btn:hover { border-color: var(--border-strong); background: var(--surface); }
  .yn-btn.sel-yes { border-color: var(--yes-border); background: var(--yes-bg); color: var(--yes-text); }
  .yn-btn.sel-no  { border-color: var(--no-border);  background: var(--no-bg);  color: var(--no-text); }

  /* Text / number inputs */
  textarea, input[type="number"] {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s ease;
    resize: vertical;
  }

  textarea:focus, input[type="number"]:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(15, 111, 255, 0.08);
  }

  textarea::placeholder, input::placeholder { color: var(--subtle); }

  /* Next button */
  .next-btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .next-btn:hover:not(:disabled) { background: #0056e0; transform: translateY(-1px); }
  .next-btn:disabled { background: var(--border); color: var(--subtle); cursor: not-allowed; transform: none; }

  /* Answers panel */
  .answers-panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .panel-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .answer-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    transition: border-color 0.2s ease;
  }

  .answer-item.new { border-color: var(--accent); animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

  .a-q { font-size: 10px; color: var(--subtle); margin-bottom: 3px; line-height: 1.4; text-transform: uppercase; letter-spacing: 0.06em; }
  .a-a { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.4; }

  .empty-panel {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    color: var(--subtle);
    font-size: 12px;
    line-height: 1.7;
  }

  /* Result screen */
  .result-section { animation: fadeUp 0.4s ease both; }

  .result-header {
    margin-bottom: 36px;
  }

  .result-header h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 40px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }

  .result-header p { font-size: 13px; color: var(--muted); }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 760px) { .result-grid { grid-template-columns: 1fr; } }

  /* Steps card */
  .steps-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .steps-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .step-row:last-child { margin-bottom: 0; }

  .step-num {
    min-width: 24px;
    height: 24px;
    background: var(--accent-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    margin-top: 1px;
  }

  .step-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .step-text strong { color: var(--text); font-weight: 500; }

  /* Answers recap */
  .recap-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 20px;
  }

  @media (max-width: 560px) { .recap-grid { grid-template-columns: 1fr; } }

  /* Prompt box */
  .prompt-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .prompt-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 14px;
  }

  /* Copy button */
  .copy-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 10px;
  }

  .copy-btn:hover { background: #0056e0; transform: translateY(-1px); }
  .copy-btn.copied { background: var(--success); }

  .restart-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .restart-btn:hover { border-color: var(--border-strong); color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2h4v4H2zM8 2h4v4H8zM2 8h4v4H2zM10 8h2v6h-2zM8 10h4v2H8z"/>
      </svg>
    </div>
    <span class="logo-text">Copilot Email Generator</span>
  </div>
  <span class="topbar-badge">No login required</span>
</div>

<div class="main" id="main"></div>

<script>
const QS = [
  {id:1,  type:"text",   text:"Please input CMP application reference number.",           hint:"This will form part of the email subject line"},
  {id:2,  type:"text",   text:"Please input CMP ID ref.",                                  hint:"This will complete the email subject line"},
  {id:3,  type:"choice", text:"Please select the communication type.",                     hint:"This will appear between the two references in the subject line", options:["Internal Communication","External Communication"], defaultVal:"External Communication"},
  {id:4,  type:"yesno",  text:"Is there a sewer infrastructure within the subject block?", hint:"", defaultVal:"Yes"},
  {id:5,  type:"yesno",  text:"Is there a sewer manhole within the subject block?",        hint:"Shown only when Q4 is Yes", defaultVal:"No"},
  {id:6,  type:"number", text:"Enter pipe diameter (mm).",                                  hint:"Numbers only", defaultVal:"150"},
  {id:7,  type:"number", text:"Enter approx. pipe depth in meters.",                       hint:"e.g. 1.5 — Access Passage will be calculated automatically"},
  {id:8,  type:"number", text:"What is the approx. sewer boundary offset? (m)",            hint:"Distance in metres from pipe centre to block boundary"},
  {id:9,  type:"compass", text:"Which boundary is the asset located?",                      hint:"Select one", options:["Front","Rear","North","West","East","South"], defaultVal:"Rear"},
  {id:10, type:"yesno",  text:"Is the PPE entirely clear of all structures?",              hint:"Are there no proposed or existing structures within the Pipe Protection Envelope?", defaultVal:"No"},
  {id:11, type:"yesno",  text:"Are there any structures within the Zone of Influence?",    hint:"ZOI extends at 45 degrees from pipe invert to NGL on both sides", defaultVal:"No"},
  {id:12, type:"yesno",  text:"Are the minimum access passage widths provided?",          hint:"Refer to calculated Access Passage and Emergency Access Passage values", defaultVal:"Yes"},
];

// Sewer infra answer is at index 3 (Q4). If No, Q5-Q9 are skipped.
// When Q4 is No, answers[4..8] are stored as 'N/A' so indices stay consistent.
function sewerIsYes() { return answers[3] === 'Yes'; }

// Assessment text based on Q10 (PPE clear, index 9) and Q11 (structures in ZOI, index 10)
function getAssessmentText() {
  if (!sewerIsYes()) return null;
  const ppeClear     = answers[9];
  const structInZOI  = answers[10];
  if (!ppeClear || !structInZOI || ppeClear === 'N/A') return null;

  const offset    = parseFloat(answers[7]) || 0;
  const pipeDepth = parseFloat(answers[6]) || 0;
  const ppeM      = (() => {
    const p = getPipeProtection() || '2.5m wide';
    if (p.startsWith('Seek')) return 4.0;
    if (p === '3.5m wide') return 3.5;
    return 2.5;
  })();

  const distPPE = (offset + ppeM / 2).toFixed(1);
  const distZOI = (offset + pipeDepth).toFixed(1);
  const boundary = answers[8] || 'subject';

  const shallowPipe = pipeDepth < ppeM / 2;

  if (ppeClear === 'No' && structInZOI === 'Yes') {
    let txt = 'Design & siting is NOT acceptable. All proposed structures must be moved outside the Pipe Protection Envelope (approx. ' + distPPE + 'm from the ' + boundary + ' boundary).';
    if (!shallowPipe) {
      txt += ' A structural design solution for all proposed structures within the Zone of Influence (approx. ' + distZOI + 'm from the ' + boundary + ' boundary) must be provided, ' +
        'including a site-specific detailed section and certification from a licensed structural engineer confirming stability of the ' +
        'structure and foundations in the event of a full depth excavation of the Pipe Protection Envelope.';
    }
    return txt;
  }
  if (ppeClear === 'No' && structInZOI === 'No') {
    let txtNN = 'Design & siting is NOT acceptable. All proposed structures must be moved outside the Pipe Protection Envelope (approx. ' + distPPE + 'm from the ' + boundary + ' boundary).';
    if (!shallowPipe) {
      txtNN += ' No structures are indicated within the Zone of Influence however the PPE must remain clear at all times.';
    }
    return txtNN;
  }
  if (ppeClear === 'Yes' && structInZOI === 'Yes') {
    let txt2 = 'Design & siting is acceptable however structures are within the Zone of Influence of the existing sewer main.';
    if (!shallowPipe) {
      txt2 += ' A structural design solution must be provided for all proposed structures within the Zone of Influence (approx. ' + distZOI + 'm from the ' + boundary + ' boundary), ' +
        'including a site-specific detailed section and certification from a licensed structural engineer confirming stability ' +
        'of the structure and foundations in the event of a full depth excavation of the Pipe Protection Envelope.';
    }
    return txt2;
  }
  if (ppeClear === 'Yes' && structInZOI === 'No') {
    return 'Design & siting is acceptable. The Pipe Protection Envelope (approx. ' + distPPE + 'm from the ' + boundary + ' boundary) and Zone of Influence are clear of all proposed structures. ' +
      'Standard conditions apply. Confirm asset location on site prior to construction.';
  }
  return null;
}

// Min access passage note — if Q12 (index 11) is No
function getMinPassageNote() {
  if (!sewerIsYes()) return null;
  if (answers[11] !== 'No') return null;
  const ap  = getAccessPassage();
  const ep  = getEmergencyPassage();
  let note = 'Minimum access passage widths are not provided. ';
  if (ap)  note += 'Access Passage must be a minimum of ' + ap + '. ';
  if (ep)  note += 'Emergency Access Passage must be a minimum of ' + ep + ' and must be maintained as a 24/7 emergency access passage at all times. ';
  note += 'These must be provided in accordance with the minimum Icon Water passage requirements and clearly detailed on the site plans prior to acceptance.';
  return note.trim();
}

// Access Passage from pipe depth (index 7)
function getAccessPassage() {
  if (!sewerIsYes()) return null;
  const depth = parseFloat(answers[6]);
  if (isNaN(depth)) return null;
  return depth < 2.2 ? '1.8m wide x 2.65m high' : '2.5m wide x 2.85m high';
}

// Emergency Access Passage — only if manhole is Yes (index 4)
function getEmergencyPassage() {
  if (!sewerIsYes()) return null;
  if (answers[4] !== 'Yes') return null;
  return '1.5m wide x 2.2m high';
}

// Pipe Protection Envelope — based on pipe diameter (index 5) and pipe depth (index 7)
function getPipeProtection() {
  if (!sewerIsYes()) return null;
  const diam  = parseFloat(answers[5]);
  const depth = parseFloat(answers[6]);
  if (isNaN(diam) || isNaN(depth)) return null;
  if (diam > 375 || depth > 5)          return 'Seek Design & Engineering Advice';
  if (diam > 225 && diam <= 375)        return '3.5m wide';
  if (diam <= 225 && depth < 5)         return '2.5m wide';
  return 'Seek Design & Engineering Advice';
}

let cur = 0, answers = [], pending = null;
const main = document.getElementById('main');

// ── Subject preview helpers (global so all handlers can call them) ──────────
// liveRef/liveId track typed-but-not-yet-confirmed values for Q1 & Q2
let liveRef = '', liveId = '';

function subjectPlainText() {
  const r  = answers[0] !== undefined ? answers[0] : liveRef;
  const id = answers[1] !== undefined ? answers[1] : liveId;
  const ct = answers[2] || '';
  return [r, ct, id].filter(Boolean).join(' ');
}

function buildSubjectHTML() {
  const r  = answers[0] !== undefined ? answers[0] : liveRef;
  const id = answers[1] !== undefined ? answers[1] : liveId;
  const ct = answers[2] || '';

  const refPart = r
    ? '<span style="color:var(--accent);font-weight:600;">' + r + '</span>'
    : '<span style="color:var(--subtle);font-style:italic;">[CMP Ref]</span>';

  const ctPart = ct
    ? '<span style="color:#7c3aed;font-weight:600;">' + ct + '</span>'
    : (cur >= 2 ? '<span style="color:var(--subtle);font-style:italic;">[Comm Type]</span>' : '');

  const idPart = id
    ? '<span style="color:var(--text);font-weight:600;">' + id + '</span>'
    : (cur >= 1 ? '<span style="color:var(--subtle);font-style:italic;">[CMP ID]</span>' : '');

  return [refPart, ctPart, idPart].filter(Boolean)
    .join(' <span style="color:var(--subtle);margin:0 2px;">·</span> ');
}

function refreshSubjectPreview() {
  const el = document.getElementById('subject-preview');
  if (el) el.innerHTML = buildSubjectHTML();
  const copyLink = document.getElementById('subject-copy-link');
  if (copyLink) {
    const txt = subjectPlainText();
    copyLink.style.display = txt.replace(/\[.*?\]/g,'').trim() ? 'inline' : 'none';
  }
}

function makeAutoCard(bgColor, borderColor, labelColor, valueColor, labelText, valueText) {
  const card = document.createElement('div');
  card.style.cssText = 'background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:10px;padding:10px 14px;';
  const topRow = document.createElement('div');
  topRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;';
  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:10px;color:' + labelColor + ';text-transform:uppercase;letter-spacing:0.09em;font-weight:600;';
  lbl.textContent = labelText;
  const cpBtn = document.createElement('a');
  cpBtn.href = '#';
  cpBtn.style.cssText = 'font-size:10px;color:' + labelColor + ';text-decoration:none;font-weight:500;border:1px solid ' + borderColor + ';border-radius:4px;padding:2px 7px;transition:all 0.15s;';
  cpBtn.textContent = 'Copy';
  cpBtn.onclick = (e) => {
    e.preventDefault();
    navigator.clipboard.writeText(valueText).then(() => {
      cpBtn.textContent = '✓';
      setTimeout(() => cpBtn.textContent = 'Copy', 1800);
    });
  };
  topRow.appendChild(lbl);
  topRow.appendChild(cpBtn);
  const val = document.createElement('div');
  val.style.cssText = 'font-size:13px;font-weight:600;color:' + valueColor + ';';
  val.textContent = valueText;
  card.appendChild(topRow);
  card.appendChild(val);
  return card;
}

// ── Cross-section SVG diagram generator ─────────────────────────────────────
function buildCrossSectionSVG(compact) {
  const depth  = parseFloat(answers[6]) || 1.5;
  const diamMM = parseFloat(answers[5]) || 150;
  const ppe    = getPipeProtection() || '2.5m wide';
  const isAdv  = ppe.startsWith('Seek');

  // World model (metres)
  const aboveGL = 3.0;
  const belowGL = depth + (diamMM / 1000 / 2) + 0.5;
  const worldH  = aboveGL + belowGL;

  // SVG canvas — compact mode for sidebar, full mode for result screen
  const W  = compact ? 340 : 720;
  const H  = compact ? 360 : 520;
  const mL = compact ? 54 : 110;
  const mR = compact ? 44 : 105;
  const mT = compact ? 36 : 44;
  const mB = compact ? 28 : 44;
  const dW = W - mL - mR;
  const dH = H - mT - mB;
  const sc = dH / worldH;   // px per metre

  // Key coords
  const yGL    = mT + aboveGL * sc;
  const yPipeC = yGL + depth * sc;
  const yInv   = yPipeC + (diamMM / 1000 / 2) * sc;
  const cx     = mL + dW / 2;
  const pipeR  = Math.max(7, Math.min(36, (diamMM / 1000 / 2) * sc));

  // PPE half-width in px
  const ppeM    = isAdv ? 4.0 : (ppe === '3.5m wide' ? 3.5 : 2.5);
  const ppeHalf = (ppeM / 2) * sc;
  const ppeL    = cx - ppeHalf;
  const ppeR2   = cx + ppeHalf;

  // Boundary offset (Q9, index 8) — distance from pipe centre to block boundary
  const offsetM  = parseFloat(answers[7]) || 0;
  const offsetPx = offsetM * sc;
  // Boundary sits to the RIGHT of pipe centre (adjustable side)
  const xBound   = cx + offsetPx;

  // Distance from block boundary to far edge of PPE (right side)
  const distBoundToPPE = ppeR2 - xBound;   // can be negative (boundary outside PPE)

  // Zone of influence: 45-deg lines from pipe invert bottom up to NGL
  // left side: from (cx - pipeR, yInv) up-left at 45 deg until y=yGL
  const zoiRise = yInv - yGL;   // vertical rise in px
  const zoiLx   = cx - pipeR - zoiRise;
  const zoiRx   = cx + pipeR + zoiRise;

  const C = {
    sky: '#eff6ff', soilFill: '#d4a96a', soilDk: '#92671e',
    ppeStroke: isAdv ? '#dc2626' : '#2563eb',
    ppeHatch: isAdv ? '#dc2626' : '#2563eb',
    ppeHighlight: isAdv ? 'rgba(220,38,38,0.07)' : 'rgba(37,99,235,0.07)',
    zoiFill: 'rgba(251,191,36,0.18)', zoiStroke: '#d97706',
    gl: '#374151', pipe: '#4b5563',
    dim: '#dc2626', anno: '#1e293b', muted: '#6b7280',
    pilLine: '#b45309'
  };

  const L = [];
  const o = s => L.push(s);
  const fs = compact ? 9 : 11;   // base font size

  o('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block;font-family:\'Geist Mono\',monospace,sans-serif;">');

  // ── defs ────────────────────────────────────────────────────────────────
  o('<defs>');
  // Soil texture
  o('<pattern id="sp' + (compact?'c':'f') + '" patternUnits="userSpaceOnUse" width="16" height="16">');
  o('<rect width="16" height="16" fill="' + C.soilFill + '"/>');
  o('<circle cx="3" cy="4" r="1.1" fill="' + C.soilDk + '" opacity="0.4"/>');
  o('<circle cx="10" cy="11" r="0.9" fill="' + C.soilDk + '" opacity="0.35"/>');
  o('<circle cx="13" cy="2" r="0.7" fill="' + C.soilDk + '" opacity="0.3"/>');
  o('</pattern>');
  // PPE hatch (always — both advice and normal get hatching)
  const hId = 'ph' + (compact ? 'c' : 'f');
  const hCol = C.ppeHatch;
  o('<pattern id="' + hId + '" patternUnits="userSpaceOnUse" width="8" height="8">');
  o('<line x1="0" y1="8" x2="8" y2="0" stroke="' + hCol + '" stroke-width="1.2" opacity="0.5"/>');
  o('<line x1="-2" y1="2" x2="2" y2="-2" stroke="' + hCol + '" stroke-width="1.2" opacity="0.5"/>');
  o('<line x1="6" y1="10" x2="10" y2="6" stroke="' + hCol + '" stroke-width="1.2" opacity="0.5"/>');
  o('</pattern>');
  o('</defs>');

  // ── Sky / above-ground zone ──────────────────────────────────────────────
  o('<rect x="' + mL + '" y="' + mT + '" width="' + dW + '" height="' + (yGL - mT) + '" fill="' + C.sky + '"/>');

  // ── PPE highlight extends ABOVE NGL to top of sky zone ───────────────────
  // Solid tinted highlight column for full PPE width, sky portion
  o('<rect x="' + ppeL + '" y="' + mT + '" width="' + (ppeR2 - ppeL) + '" height="' + (yGL - mT) + '" fill="' + C.ppeHighlight + '"/>');
  // PPE hatch — sky portion
  o('<rect x="' + ppeL + '" y="' + mT + '" width="' + (ppeR2 - ppeL) + '" height="' + (yGL - mT) + '" fill="url(#' + hId + ')" opacity="0.6"/>');

  // "No permanent structure permissible" note — centred in sky PPE zone
  if (!compact) {
    const npsY = mT + (yGL - mT) / 2;
    const npsX = cx;
    // Rotated text group — SVG transform for vertical text
    o('<text x="' + npsX + '" y="' + (npsY + 40) + '" text-anchor="middle" font-size="9" font-weight="bold" fill="' + C.ppeStroke + '" transform="rotate(-90 ' + npsX + ' ' + npsY + ')" opacity="0.85">No permanent structure permissible</text>');
  } else {
    // Compact: short horizontal note at top of sky PPE area
    o('<text x="' + cx + '" y="' + (mT + 11) + '" text-anchor="middle" font-size="7" font-weight="bold" fill="' + C.ppeStroke + '" opacity="0.8">No permanent</text>');
    o('<text x="' + cx + '" y="' + (mT + 20) + '" text-anchor="middle" font-size="7" font-weight="bold" fill="' + C.ppeStroke + '" opacity="0.8">structure permissible</text>');
  }

  // ── Soil zone ────────────────────────────────────────────────────────────
  o('<rect x="' + mL + '" y="' + yGL + '" width="' + dW + '" height="' + (H - mB - yGL) + '" fill="url(#sp' + (compact?'c':'f') + ')"/>');

  // ── Zone of Influence (45-deg triangles from pipe invert to NGL) ─────────
  // Left triangle
  o('<polygon points="' + (cx - pipeR) + ',' + yInv + ' ' + zoiLx + ',' + yGL + ' ' + (cx - pipeR) + ',' + yGL + '" fill="' + C.zoiFill + '" stroke="none"/>');
  // Right triangle
  o('<polygon points="' + (cx + pipeR) + ',' + yInv + ' ' + zoiRx + ',' + yGL + ' ' + (cx + pipeR) + ',' + yGL + '" fill="' + C.zoiFill + '" stroke="none"/>');
  // 45-deg boundary lines
  o('<line x1="' + (cx - pipeR) + '" y1="' + yInv + '" x2="' + zoiLx + '" y2="' + yGL + '" stroke="' + C.zoiStroke + '" stroke-width="1.5" stroke-dasharray="5,3"/>');
  o('<line x1="' + (cx + pipeR) + '" y1="' + yInv + '" x2="' + zoiRx + '" y2="' + yGL + '" stroke="' + C.zoiStroke + '" stroke-width="1.5" stroke-dasharray="5,3"/>');
  // 45° angle label at pipe invert corner
  o('<text x="' + (cx - pipeR - 5) + '" y="' + (yInv - 5) + '" text-anchor="end" font-size="' + (fs-1) + '" fill="' + C.zoiStroke + '">45°</text>');

  // ── ZOI label: LEFT — anchor in the OFFSET zone between zoiLx and ppeL ──────
  // Use a point 30% from zoiLx toward ppeL — clearly in the exposed ZOI strip
  const zoiAnchorX = zoiLx + (ppeL - zoiLx) * 0.35;
  const zoiAnchorY = yGL + (yInv - yGL) * 0.45;   // slightly above mid-height
  // Label: left-aligned, left of anchor with breathing room
  const zoiLabelX = Math.max(mL + 4, zoiLx - 2);
  const zoiLabelY = zoiAnchorY;
  // Leader line: from right edge of label block to anchor
  const zoiLeaderX1 = zoiLabelX + (compact ? 28 : 48);
  o('<line x1="' + zoiLeaderX1 + '" y1="' + zoiLabelY + '" x2="' + (zoiAnchorX - 2) + '" y2="' + zoiAnchorY + '" stroke="' + C.zoiStroke + '" stroke-width="1.2" stroke-dasharray="4,2"/>');
  // Filled arrowhead pointing right toward anchor
  o('<polygon points="' + zoiAnchorX + ',' + zoiAnchorY + ' ' + (zoiAnchorX-7) + ',' + (zoiAnchorY-3.5) + ' ' + (zoiAnchorX-7) + ',' + (zoiAnchorY+3.5) + '" fill="' + C.zoiStroke + '"/>');
  // Label
  o('<text x="' + zoiLabelX + '" y="' + (zoiLabelY - 6) + '" text-anchor="start" font-size="' + (fs-1) + '" fill="' + C.zoiStroke + '" font-weight="bold">Zone of</text>');
  o('<text x="' + zoiLabelX + '" y="' + (zoiLabelY + fs) + '" text-anchor="start" font-size="' + (fs-1) + '" fill="' + C.zoiStroke + '" font-weight="bold">Influence</text>');

  // ── Struct. note: RIGHT — anchor in the OFFSET zone between ppeR2 and zoiRx ─
  if (!compact) {
    // Point 30% from zoiRx toward ppeR2 — in the exposed right ZOI strip
    const zoiRAnchorX = zoiRx - (zoiRx - ppeR2) * 0.35;
    const zoiRAnchorY = yGL + (yInv - yGL) * 0.45;
    const zoiRLabelX  = Math.min(mL + dW - 4, zoiRx + 4);
    // Leader from anchor to right label (right-aligned)
    o('<line x1="' + (zoiRAnchorX + 2) + '" y1="' + zoiRAnchorY + '" x2="' + (zoiRLabelX - 2) + '" y2="' + zoiRAnchorY + '" stroke="' + C.zoiStroke + '" stroke-width="1.2" stroke-dasharray="4,2"/>');
    // Arrowhead pointing left toward anchor
    o('<polygon points="' + zoiRAnchorX + ',' + zoiRAnchorY + ' ' + (zoiRAnchorX+7) + ',' + (zoiRAnchorY-3.5) + ' ' + (zoiRAnchorX+7) + ',' + (zoiRAnchorY+3.5) + '" fill="' + C.zoiStroke + '"/>');
    // Multi-line note right-aligned from zoiRLabelX
    const noteLines = ['Structural solution', 'and details / certification', 'from licensed structural', 'engineer required'];
    noteLines.forEach((line, idx) => {
      o('<text x="' + (zoiRLabelX - 2) + '" y="' + (zoiRAnchorY - 18 + idx * 11) + '" text-anchor="end" font-size="8" fill="' + C.zoiStroke + '" font-style="italic">' + line + '</text>');
    });
  } else {
    o('<text x="' + zoiLabelX + '" y="' + (zoiLabelY + fs*2 + 5) + '" text-anchor="start" font-size="7" fill="' + C.zoiStroke + '" font-style="italic">Struct. Eng.</text>');
    o('<text x="' + zoiLabelX + '" y="' + (zoiLabelY + fs*3 + 6) + '" text-anchor="start" font-size="7" fill="' + C.zoiStroke + '" font-style="italic">cert. required</text>');
  }

  // ── PPE envelope — underground portion (hatched + highlight) ─────────────
  o('<rect x="' + ppeL + '" y="' + yGL + '" width="' + (ppeR2 - ppeL) + '" height="' + (yInv - yGL) + '" fill="' + C.ppeHighlight + '"/>');
  o('<rect x="' + ppeL + '" y="' + yGL + '" width="' + (ppeR2 - ppeL) + '" height="' + (yInv - yGL) + '" fill="url(#' + hId + ')" opacity="0.7"/>');
  // PPE border (full height from mT to yInv)
  o('<rect x="' + ppeL + '" y="' + mT + '" width="' + (ppeR2 - ppeL) + '" height="' + (yInv - mT) + '" fill="none" stroke="' + C.ppeStroke + '" stroke-width="' + (compact?1.5:2) + '"/>');

  // PPE label inside underground portion
  if (!compact) {
    const ppeMidY = yGL + (yInv - yGL) / 2;
    o('<text x="' + (ppeL - 6) + '" y="' + (ppeMidY - 6) + '" text-anchor="end" font-size="10" font-weight="bold" fill="' + C.ppeStroke + '">PPE</text>');
    o('<text x="' + (ppeL - 6) + '" y="' + (ppeMidY + 8) + '" text-anchor="end" font-size="9" fill="' + C.ppeStroke + '">' + ppeM + 'm wide</text>');
  }

  // PPE width dimension arrow above diagram
  const dY = mT - (compact ? 14 : 20);
  o('<line x1="' + ppeL + '" y1="' + dY + '" x2="' + ppeR2 + '" y2="' + dY + '" stroke="' + C.ppeStroke + '" stroke-width="1.4"/>');
  o('<line x1="' + ppeL + '" y1="' + (dY-4) + '" x2="' + ppeL + '" y2="' + (dY+4) + '" stroke="' + C.ppeStroke + '" stroke-width="1.4"/>');
  o('<line x1="' + ppeR2 + '" y1="' + (dY-4) + '" x2="' + ppeR2 + '" y2="' + (dY+4) + '" stroke="' + C.ppeStroke + '" stroke-width="1.4"/>');
  o('<text x="' + cx + '" y="' + (dY - 5) + '" text-anchor="middle" font-size="' + fs + '" fill="' + C.ppeStroke + '" font-weight="bold">PPE: ' + ppeM + 'm wide</text>');

  // ── Natural Ground Level line ─────────────────────────────────────────────
  o('<line x1="' + mL + '" y1="' + yGL + '" x2="' + (mL + dW) + '" y2="' + yGL + '" stroke="' + C.gl + '" stroke-width="2.5"/>');
  for (let hx = mL; hx < mL + dW; hx += 10) {
    o('<line x1="' + hx + '" y1="' + yGL + '" x2="' + (hx+7) + '" y2="' + (yGL+6) + '" stroke="' + C.gl + '" stroke-width="1" opacity="0.35"/>');
  }
  o('<text x="' + (mL + dW + 4) + '" y="' + (yGL - 4) + '" font-size="' + fs + '" fill="' + C.gl + '" font-weight="bold">NGL</text>');

  // ── 3m above annotation (left) ────────────────────────────────────────────
  if (!compact) {
    const aX = mL - 72;
    const aMid = mT + (yGL - mT) / 2;
    o('<line x1="' + (aX+18) + '" y1="' + mT + '" x2="' + (aX+18) + '" y2="' + yGL + '" stroke="#3b82f6" stroke-width="1.2"/>');
    o('<line x1="' + (aX+12) + '" y1="' + mT + '" x2="' + (aX+24) + '" y2="' + mT + '" stroke="#3b82f6" stroke-width="1.2"/>');
    o('<line x1="' + (aX+12) + '" y1="' + yGL + '" x2="' + (aX+24) + '" y2="' + yGL + '" stroke="#3b82f6" stroke-width="1.2"/>');
    o('<text x="' + (aX+10) + '" y="' + (aMid - 8) + '" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="bold">3.0m</text>');
    o('<text x="' + (aX+10) + '" y="' + (aMid + 5) + '" text-anchor="middle" font-size="9" fill="#3b82f6">above NGL</text>');
  }

  // ── Pipe — single circle outline only ────────────────────────────────────
  o('<circle cx="' + cx + '" cy="' + yPipeC + '" r="' + pipeR + '" fill="none" stroke="' + C.pipe + '" stroke-width="' + (compact ? 1.8 : 2.2) + '"/>');
  if (!compact) {
    o('<text x="' + (cx + pipeR + 10) + '" y="' + (yPipeC - 4) + '" font-size="10" font-weight="bold" fill="' + C.anno + '">' + '\u00d8' + ' ' + diamMM + 'mm</text>');
    o('<text x="' + (cx + pipeR + 10) + '" y="' + (yPipeC + 9) + '" font-size="9" fill="' + C.muted + '">Sewer Pipe</text>');
  } else {
    o('<text x="' + (cx + pipeR + 6) + '" y="' + (yPipeC + 4) + '" font-size="8" fill="' + C.anno + '">' + '\u00d8' + diamMM + 'mm</text>');
  }

  // ── Pipe Invert line (outer wall bottom of pipe) ──────────────────────────
  o('<line x1="' + (mL + 4) + '" y1="' + yInv + '" x2="' + (mL + dW - 4) + '" y2="' + yInv + '" stroke="' + C.pilLine + '" stroke-width="1.4" stroke-dasharray="6,4"/>');
  // Left label
  o('<text x="' + (mL - 4) + '" y="' + (yInv - 4) + '" text-anchor="end" font-size="' + (fs-1) + '" font-weight="bold" fill="' + C.pilLine + '">Pipe</text>');
  o('<text x="' + (mL - 4) + '" y="' + (yInv + (fs)) + '" text-anchor="end" font-size="' + (fs-1) + '" font-weight="bold" fill="' + C.pilLine + '">Invert</text>');
  // Arrow callout right side
  if (!compact) {
    const pilAx = mL + dW - 22;
    o('<line x1="' + pilAx + '" y1="' + (yInv - 20) + '" x2="' + pilAx + '" y2="' + (yInv - 2) + '" stroke="' + C.pilLine + '" stroke-width="1.5"/>');
    o('<polygon points="' + pilAx + ',' + yInv + ' ' + (pilAx-4) + ',' + (yInv-8) + ' ' + (pilAx+4) + ',' + (yInv-8) + '" fill="' + C.pilLine + '"/>');
    o('<text x="' + pilAx + '" y="' + (yInv - 24) + '" text-anchor="middle" font-size="9" fill="' + C.pilLine + '">Pipe Invert</text>');
  }

  // ── Depth annotation — vertical witness line inside right margin ────────────
  // Compact: use a tight right offset; Full: sit within mR so text is never cropped
  const depX   = compact ? (mL + dW + 18) : (mL + dW + 22);
  const depMid = yGL + (yInv - yGL) / 2;
  // Witness lines from diagram edge to dimension line
  o('<line x1="' + (mL+dW) + '" y1="' + yGL + '" x2="' + (depX+2) + '" y2="' + yGL + '" stroke="' + C.dim + '" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.5"/>');
  o('<line x1="' + (mL+dW) + '" y1="' + yInv + '" x2="' + (depX+2) + '" y2="' + yInv + '" stroke="' + C.dim + '" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.5"/>');
  // Main dimension line
  o('<line x1="' + depX + '" y1="' + yGL + '" x2="' + depX + '" y2="' + yInv + '" stroke="' + C.dim + '" stroke-width="1.6"/>');
  o('<line x1="' + (depX-4) + '" y1="' + yGL + '" x2="' + (depX+4) + '" y2="' + yGL + '" stroke="' + C.dim + '" stroke-width="1.6"/>');
  o('<line x1="' + (depX-4) + '" y1="' + yInv + '" x2="' + (depX+4) + '" y2="' + yInv + '" stroke="' + C.dim + '" stroke-width="1.6"/>');
  // Label — centred on the dimension line
  o('<text x="' + (depX + 5) + '" y="' + (depMid - 14) + '" font-size="' + (fs-1) + '" fill="' + C.dim + '" font-style="italic">approx.</text>');
  o('<text x="' + (depX + 5) + '" y="' + (depMid) + '" font-size="' + fs + '" font-weight="bold" fill="' + C.dim + '">' + depth.toFixed(2) + 'm</text>');
  if (!compact) {
    o('<text x="' + (depX + 5) + '" y="' + (depMid + 13) + '" font-size="8" fill="' + C.dim + '">NGL–Invert</text>');
  }

  // ── Block boundary line — drawn whenever Q8 offset is provided ──────────────
  if (offsetM > 0) {
    // Clamp xBound within drawing area for rendering, but always dimension from cx
    const xB = Math.min(Math.max(xBound, mL + 4), mL + dW - 4);

    // Vertical dashed boundary line — full diagram height
    o('<line x1="' + xB + '" y1="' + mT + '" x2="' + xB + '" y2="' + (H - mB) + '" stroke="#7c3aed" stroke-width="' + (compact?1.8:2.2) + '" stroke-dasharray="8,4"/>');

    // "Block Boundary" label at top of line
    o('<text x="' + xB + '" y="' + (mT - 6) + '" text-anchor="middle" font-size="' + (fs) + '" font-weight="bold" fill="#7c3aed">Block Boundary</text>');

    // Dimension: pipe centre → boundary, drawn below Pipe Invert level
    const bdDimY = yInv + (compact ? 16 : 24);
    // Horizontal dim line with ticks
    o('<line x1="' + cx + '" y1="' + bdDimY + '" x2="' + xB + '" y2="' + bdDimY + '" stroke="#7c3aed" stroke-width="1.5"/>');
    o('<line x1="' + cx + '" y1="' + (bdDimY-5) + '" x2="' + cx + '" y2="' + (bdDimY+5) + '" stroke="#7c3aed" stroke-width="1.5"/>');
    o('<line x1="' + xB + '" y1="' + (bdDimY-5) + '" x2="' + xB + '" y2="' + (bdDimY+5) + '" stroke="#7c3aed" stroke-width="1.5"/>');
    // Arrowheads
    o('<polygon points="' + cx + ',' + bdDimY + ' ' + (cx+7) + ',' + (bdDimY-3) + ' ' + (cx+7) + ',' + (bdDimY+3) + '" fill="#7c3aed"/>');
    o('<polygon points="' + xB + ',' + bdDimY + ' ' + (xB-7) + ',' + (bdDimY-3) + ' ' + (xB-7) + ',' + (bdDimY+3) + '" fill="#7c3aed"/>');
    // Distance label centred on dimension line
    const bdMidX = (cx + xB) / 2;
    // White background pill for legibility
    const labelW = compact ? 36 : 46;
    const labelW2 = compact ? 54 : 68;
    o('<rect x="' + (bdMidX - labelW2/2) + '" y="' + (bdDimY - fs - 14) + '" width="' + labelW2 + '" height="' + (fs + 16) + '" fill="white" rx="3" opacity="0.92"/>');
    o('<text x="' + bdMidX + '" y="' + (bdDimY - fs - 2) + '" text-anchor="middle" font-size="' + (fs-1) + '" fill="#7c3aed" font-style="italic">approx.</text>');
    o('<text x="' + bdMidX + '" y="' + (bdDimY - 3) + '" text-anchor="middle" font-size="' + fs + '" font-weight="bold" fill="#7c3aed">' + offsetM + 'm</text>');

    // Vertical witness line from pipe centre down to dim line
    o('<line x1="' + cx + '" y1="' + yPipeC + '" x2="' + cx + '" y2="' + (bdDimY + 2) + '" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>');
  }

  // ── Diagram border ────────────────────────────────────────────────────────
  o('<rect x="' + mL + '" y="' + mT + '" width="' + dW + '" height="' + dH + '" fill="none" stroke="#d1d5db" stroke-width="1" rx="3"/>');

  // ── Legend (full only) ────────────────────────────────────────────────────
  if (!compact) {
    const legY = H - mB + 18;
    const legItems = [
      { fill: C.sky,      stroke: '#93c5fd', label: 'Above NGL (3m)' },
      { fill: C.soilFill, stroke: C.soilDk,  label: 'Underground soil' },
      { fill: C.ppeHighlight, stroke: C.ppeStroke, label: 'PPE (' + ppe + ')' },
      { fill: C.zoiFill,  stroke: C.zoiStroke, label: 'Zone of Influence' },
    ];
    let lx = mL;
    legItems.forEach(it => {
      o('<rect x="' + lx + '" y="' + (legY-9) + '" width="12" height="9" fill="' + it.fill + '" stroke="' + it.stroke + '" stroke-width="0.8"/>');
      o('<text x="' + (lx+15) + '" y="' + legY + '" font-size="9" fill="#4b5563">' + it.label + '</text>');
      lx += 130;
    });
  }

  // ── Disclaimer (full only) ──────────────────────────────────────────────────
  if (!compact) {
    const disY = H - mB + 34;
    const disclaimer = 'DISCLAIMER: Pipe depth, alignment and all dimensions shown are approximate only. The proponent, builder or developer is responsible for verifying';
    const disclaimer2 = 'all parameters on site via a physical survey prior to commencing any construction works. Do not rely solely on this diagram for design purposes.';
    o('<text x="' + mL + '" y="' + disY + '" font-size="7.5" fill="#9ca3af" font-style="italic">' + disclaimer + '</text>');
    o('<text x="' + mL + '" y="' + (disY + 11) + '" font-size="7.5" fill="#9ca3af" font-style="italic">' + disclaimer2 + '</text>');
  }

  o('</svg>');
  return L.join('\n');
}

// ── Image export helpers ────────────────────────────────────────────────────
function svgToPngDataUrl(svgEl, scale, callback) {
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    const w = svgEl.getBoundingClientRect().width || svgEl.viewBox.baseVal.width;
    const h = svgEl.getBoundingClientRect().height || svgEl.viewBox.baseVal.height;
    const canvas = document.createElement('canvas');
    canvas.width  = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    callback(canvas.toDataURL('image/jpeg', 0.95));
  };
  img.src = url;
}

function saveDiagramAsJPG(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const svgEl = wrap.querySelector('svg');
  if (!svgEl) return;
  svgToPngDataUrl(svgEl, 2, (dataUrl) => {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'sewer-cross-section.jpg';

}

function copyDiagramToClipboard(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const svgEl = wrap.querySelector('svg');
  if (!svgEl) return;
  svgToPngDataUrl(svgEl, 2, (dataUrl) => {
    fetch(dataUrl)
      .then(r => r.blob())
      .then(blob => {
        try {
          navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(() => {
            // brief feedback
            const fb = document.createElement('div');
            fb.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;z-index:9999;font-family:monospace;';
            fb.textContent = '✓ Image copied to clipboard';
            document.body.appendChild(fb);
            setTimeout(() => fb.remove(), 2200);
          });
        } catch(err) {
          // fallback: just download
          saveDiagramAsJPG(wrapperId);
        }
      });
  });
}

function loadRecordIntoCalculator(rec) {
  // Restore answers array from saved record (indices 0-11)
  // Map: 0=cmpRef,1=cmpId,2=commType,3=sewerInfra,4=manhole,5=pipeDiam,
  //      6=pipeDepth,7=offset,8=boundaryLoc,9=ppeClear,10=structInZOI,11=minPassage
  const sewerYes = rec.sewerInfra === 'Yes';
  answers = [
    rec.cmpRef      || '',
    rec.cmpId       || '',
    rec.commType    || '',
    rec.sewerInfra  || 'Yes',
    sewerYes ? (rec.manhole      || 'No')   : 'N/A',
    sewerYes ? (rec.pipeDiam     || '150')  : 'N/A',
    sewerYes ? (rec.pipeDepth    || '')     : 'N/A',
    sewerYes ? (rec.offset       || '')     : 'N/A',
    sewerYes ? (rec.boundaryLoc  || 'Rear') : 'N/A',
    sewerYes ? (rec.ppeClear     || 'No')   : 'N/A',
    sewerYes ? (rec.structInZOI  || 'No')   : 'N/A',
    sewerYes ? (rec.minPassage   || 'Yes')  : 'N/A',
  ];
  liveRef = answers[0];
  liveId  = answers[1];
  cur = QS.length; // go straight to result screen, no new record saved
  renderResultReadOnly();
}

    cpAllBtn.textContent = 'Copy all comments to clipboard';

      const txt = [...recs].reverse().map(r => {
        const dt = new Date(r.date).toLocaleString('en-AU');
        return '[' + dt + (r.cmpRef?' | '+r.cmpRef:'') + ']\n' + r.comment;
      }).join('\n\n---\n\n');
      navigator.clipboard.writeText(txt).then(() => { cpAllBtn.textContent = '✓ Copied!'; setTimeout(()=>{ cpAllBtn.textContent='Copy all comments to clipboard'; }, 2000); });

    clrBtn.style.cssText = 'width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;';

  }

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function openInlineEdit(idx) {

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';

  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.18);';

  const hdr = document.createElement('div');
  hdr.style.cssText = 'margin-bottom:20px;';
  hdr.innerHTML =
    '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Q' + (idx+1) + ' of ' + QS.length + '</div>' +

  modal.appendChild(hdr);

  // Input area
  const inputArea = document.createElement('div');
  let newVal = currentVal;

  if (q.type === 'yesno') {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:10px;';
    ['Yes','No'].forEach(v => {
      const btn = document.createElement('button');
      btn.style.cssText = 'flex:1;padding:13px;border:1px solid var(--border);border-radius:10px;background:' + (currentVal===v?(v==='Yes'?'var(--yes-bg)':'var(--no-bg)'):'var(--bg)') + ';color:' + (currentVal===v?(v==='Yes'?'var(--yes-text)':'var(--no-text)'):'var(--text)') + ';font-family:inherit;font-size:13px;cursor:pointer;transition:all 0.15s;';
      if (currentVal===v) btn.style.borderColor = v==='Yes'?'var(--yes-border)':'var(--no-border)';
      btn.textContent = v;
      btn.onclick = () => {
        row.querySelectorAll('button').forEach(b => { b.style.background='var(--bg)'; b.style.color='var(--text)'; b.style.borderColor='var(--border)'; });
        btn.style.background = v==='Yes'?'var(--yes-bg)':'var(--no-bg)';
        btn.style.color = v==='Yes'?'var(--yes-text)':'var(--no-text)';
        btn.style.borderColor = v==='Yes'?'var(--yes-border)':'var(--no-border)';
        newVal = v;
      };
      row.appendChild(btn);
    });
    inputArea.appendChild(row);

  } else if (q.type === 'choice') {
    const col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      const sel = currentVal === opt;
      btn.style.cssText = 'width:100%;text-align:left;padding:12px 16px;border-radius:10px;border:1px solid ' + (sel?'#7c3aed':'var(--border)') + ';background:' + (sel?'#f3f0ff':'var(--bg)') + ';color:' + (sel?'#4c1d95':'var(--text)') + ';font-family:inherit;font-size:13px;cursor:pointer;transition:all 0.15s;';
      btn.textContent = opt;
      btn.onclick = () => {
        col.querySelectorAll('button').forEach(b => { b.style.borderColor='var(--border)'; b.style.background='var(--bg)'; b.style.color='var(--text)'; });
        btn.style.borderColor='#7c3aed'; btn.style.background='#f3f0ff'; btn.style.color='#4c1d95';
        newVal = opt;
      };
      col.appendChild(btn);
    });
    inputArea.appendChild(col);

  } else if (q.type === 'text') {
    const ta = document.createElement('textarea');
    ta.rows = 3;
    ta.value = currentVal;
    ta.style.cssText = 'width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;resize:vertical;outline:none;box-sizing:border-box;';
    ta.oninput = () => { newVal = ta.value.trim(); };
    inputArea.appendChild(ta);
    setTimeout(() => ta.focus(), 60);

  } else {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.min = 0; inp.value = currentVal;
    inp.style.cssText = 'width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;outline:none;box-sizing:border-box;';
    inp.oninput = () => { newVal = inp.value.trim(); };
    inputArea.appendChild(inp);
    setTimeout(() => inp.focus(), 60);
  }

  modal.appendChild(inputArea);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;margin-top:20px;';

  const saveBtn = document.createElement('button');
  saveBtn.style.cssText = 'flex:1;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;';
  saveBtn.textContent = 'Save change';
  saveBtn.onclick = () => {
    if (newVal === undefined || newVal === '') { overlay.remove(); return; }
    answers[idx] = newVal;
    // If Q4 changed to No, re-apply skip placeholders for Q5-Q11
    if (idx === 3 && newVal === 'No') {
      for (let k = 4; k <= 11; k++) answers[k] = 'N/A';
    }
    // If Q4 changed to Yes, clear the N/A placeholders so user can re-answer
    if (idx === 3 && newVal === 'Yes') {
      for (let k = 4; k <= 11; k++) { if (answers[k] === 'N/A') answers[k] = undefined; }
      answers = answers.filter(a => a !== undefined);
      cur = 4; // send them to Q5 to fill in sewer details
      overlay.remove();
      render();
      return;
    }
    // Update liveRef/liveId if Q1 or Q2 changed
    if (idx === 0) liveRef = newVal;
    if (idx === 1) liveId  = newVal;
    overlay.remove();
    render(); // re-render current question with updated answers
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'padding:13px 20px;background:transparent;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => overlay.remove();

  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  modal.appendChild(btnRow);

  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function goBackFromResult() {
  // Remove the last answer and go back to the last question
  if (answers.length > 0) {
    answers.pop();
    cur = answers.length;
    render();
  }
}

function render() {
  const scrollY = window.scrollY;
  main.innerHTML = '';
  cur < QS.length ? renderQ() : renderResult();
  // Preserve scroll position during re-renders (e.g. inline edits)
  window.scrollTo({ top: scrollY, behavior: 'instant' });
}

function renderQ() {
  const q = QS[cur];
  pending = null;

  // Hero (only on first question)
  if (cur === 0) {
    liveRef = ''; liveId = '';
    main.innerHTML += '<div class="hero"><div class="hero-eyebrow">Microsoft Copilot · Email Tool</div><h1>Draft better emails,<br><em>faster than ever.</em></h1><p class="hero-sub">Answer 12 quick questions and we will build a ready-to-use prompt you can paste straight into Microsoft Copilot — no login, no cost, no hassle.</p></div>';
  }

  // Progress
  const ps = document.createElement('div');
  ps.className = 'progress-section';
  ps.innerHTML =
    '<div class="progress-header"><span class="progress-title">Progress</span><span class="progress-count">' + (cur+1) + ' of ' + QS.length + ' questions</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + (cur/QS.length*100) + '%"></div></div>';
  main.appendChild(ps);

  const grid = document.createElement('div');
  grid.className = 'content-grid';

  // LEFT — question card
  const left = document.createElement('div');
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML =
    '<div class="q-num">Question ' + q.id + ' of ' + QS.length + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    (q.hint ? '<p style="font-size:11px;color:var(--subtle);margin-bottom:14px;">' + q.hint + '</p>' : '');

  const ia = document.createElement('div');
  const nb = document.createElement('button');
  nb.className = 'next-btn';
  nb.style.marginTop = '0';
  nb.textContent = cur < QS.length - 1 ? 'Next question →' : 'Submit & log record ❖';
  nb.disabled = true;
  nb.onclick = () => {
    if (!pending) return;
    if (cur === 0) liveRef = pending;
    if (cur === 1) liveId  = pending;
    answers.push(pending);
    // If Q4 (index 3) answered No, skip Q5-Q8 by inserting N/A placeholders
    if (cur === 3 && pending === 'No') {
      answers.push('N/A'); // Q5 manhole
      answers.push('N/A'); // Q6 pipe diameter
      answers.push('N/A'); // Q7 pipe depth
      answers.push('N/A'); // Q8 boundary offset
      answers.push('N/A'); // Q9 boundary location
      answers.push('N/A'); // Q10 PPE clear
      answers.push('N/A'); // Q11 structures in ZOI
      answers.push('N/A'); // Q12 min access passage
      cur = 12; // jump past all sewer questions
    } else {
      cur++;
    }
    render();
  };

  if (q.type === 'yesno') {
    ia.innerHTML = '<div class="yn-row"><button class="yn-btn" data-v="Yes">Yes</button><button class="yn-btn" data-v="No">No</button></div>';
    ia.querySelectorAll('.yn-btn').forEach(b => {
      b.onclick = () => {
        ia.querySelectorAll('.yn-btn').forEach(x => x.className = 'yn-btn');
        b.className = 'yn-btn ' + (b.dataset.v === 'Yes' ? 'sel-yes' : 'sel-no');
        pending = b.dataset.v; nb.disabled = false;
      };
    });
    // Apply default value if defined
    if (q.defaultVal) {
      const defBtn = ia.querySelector('[data-v="' + q.defaultVal + '"]');
      if (defBtn) { defBtn.click(); }
    }

  } else if (q.type === 'compass') {
    // Two-column layout: Front/Rear on left, SVG compass (N/S/E/W) on right
    const compassWrap = document.createElement('div');
    compassWrap.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center;';

    // Left col: Front + Rear buttons
    const leftCol = document.createElement('div');
    leftCol.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

    const allBtns = {};
    const selectDir = (val) => {
      Object.entries(allBtns).forEach(([k,b]) => {
        b.style.borderColor = 'var(--border)'; b.style.background = 'var(--bg)'; b.style.color = 'var(--text)';
        b.style.fontWeight = '400';
      });
      if (allBtns[val]) {
        allBtns[val].style.borderColor = '#7c3aed';
        allBtns[val].style.background = '#f3f0ff';
        allBtns[val].style.color = '#4c1d95';
        allBtns[val].style.fontWeight = '600';
      }
      pending = val; nb.disabled = false;
      refreshSubjectPreview();
      // Update compass SVG highlight
      const svg = compassWrap.querySelector('svg');
      if (svg) {
        svg.querySelectorAll('[data-dir]').forEach(el => {
          const active = el.getAttribute('data-dir') === val;
          if (el.tagName === 'circle') { el.setAttribute('fill', active ? '#7c3aed' : '#e8e4f0'); }
          if (el.tagName === 'text') { el.setAttribute('fill', active ? '#fff' : '#4c1d95'); el.setAttribute('font-weight', active ? '700' : '400'); }
        });
      }
    };

    ['Front','Rear'].forEach(opt => {
      const btn = document.createElement('button');
      btn.style.cssText = 'width:100%;text-align:center;padding:14px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;cursor:pointer;transition:all 0.15s;';
      btn.textContent = opt;
      btn.onclick = () => selectDir(opt);
      allBtns[opt] = btn;
      leftCol.appendChild(btn);
    });
    compassWrap.appendChild(leftCol);

    // Right col: SVG compass rose for N/S/E/W
    const rightCol = document.createElement('div');
    rightCol.style.cssText = 'display:flex;align-items:center;justify-content:center;';

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 160 160');
    svg.style.cssText = 'width:140px;height:140px;';

    // Compass background circle
    const bg = document.createElementNS(svgNS, 'circle');
    bg.setAttribute('cx','80'); bg.setAttribute('cy','80'); bg.setAttribute('r','76');
    bg.setAttribute('fill','var(--bg)'); bg.setAttribute('stroke','var(--border)'); bg.setAttribute('stroke-width','1.5');
    svg.appendChild(bg);

    // Cross lines
    [['80','8','80','152'],['8','80','152','80']].forEach(([x1,y1,x2,y2]) => {
      const l = document.createElementNS(svgNS, 'line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke','var(--border)'); l.setAttribute('stroke-width','1');
      svg.appendChild(l);
    });

    // Direction buttons as SVG circles + text
    const dirs = [{d:'North',x:80,y:22},{d:'South',x:80,y:138},{d:'East',x:138,y:80},{d:'West',x:22,y:80}];
    dirs.forEach(({d,x,y}) => {
      const g = document.createElementNS(svgNS, 'g');
      g.style.cursor = 'pointer';

      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r','18');
      c.setAttribute('fill','#e8e4f0'); c.setAttribute('data-dir', d);
      c.setAttribute('stroke','#c4b5fd'); c.setAttribute('stroke-width','1');

      const t = document.createElementNS(svgNS, 'text');
      t.setAttribute('x',x); t.setAttribute('y',y+5);
      t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','12');
      t.setAttribute('font-family','inherit'); t.setAttribute('fill','#4c1d95');
      t.setAttribute('data-dir', d);
      t.textContent = d[0]; // N S E W

      g.appendChild(c); g.appendChild(t);
      g.onclick = () => selectDir(d);
      // Hover effect
      g.onmouseenter = () => { if (pending !== d) { c.setAttribute('fill','#ddd6fe'); } };
      g.onmouseleave = () => { if (pending !== d) { c.setAttribute('fill','#e8e4f0'); } };

      svg.appendChild(g);
      allBtns[d] = {
        style: { set borderColor(v){}, set background(v){}, set color(v){}, set fontWeight(v){} }
      };
      // Override selectDir for SVG elements: handled via svg querySelectorAll above
    });

    // Centre compass rose decoration
    const centre = document.createElementNS(svgNS, 'circle');
    centre.setAttribute('cx','80'); centre.setAttribute('cy','80'); centre.setAttribute('r','8');
    centre.setAttribute('fill','var(--border)');
    svg.appendChild(centre);

    rightCol.appendChild(svg);
    compassWrap.appendChild(rightCol);
    ia.appendChild(compassWrap);

    // Apply default
    if (q.defaultVal) setTimeout(() => selectDir(q.defaultVal), 50);

  } else if (q.type === 'choice') {
    const choiceRow = document.createElement('div');
    choiceRow.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
    const choiceBtns = [];
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.style.cssText = 'width:100%;text-align:left;padding:14px 18px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;cursor:pointer;transition:all 0.15s;';
      btn.textContent = opt;
      btn.onclick = () => {
        choiceBtns.forEach(b => { b.style.borderColor = 'var(--border)'; b.style.background = 'var(--bg)'; b.style.color = 'var(--text)'; });
        btn.style.borderColor = '#7c3aed'; btn.style.background = '#f3f0ff'; btn.style.color = '#4c1d95';
        pending = opt; nb.disabled = false;
        refreshSubjectPreview();
      };
      choiceBtns.push(btn);
      choiceRow.appendChild(btn);
    });
    ia.appendChild(choiceRow);
    // Apply choice default if defined
    if (q.defaultVal) {
      const defBtn = choiceBtns.find(b => b.textContent === q.defaultVal);
      if (defBtn) setTimeout(() => defBtn.click(), 50);
    }

  } else if (q.type === 'text') {
    const ta = document.createElement('textarea');
    ta.rows = 4; ta.placeholder = 'Type your answer here...';
    ta.oninput = () => {
      pending = ta.value.trim();
      nb.disabled = !pending;
      if (cur === 0) { liveRef = ta.value; refreshSubjectPreview(); }
      if (cur === 1) { liveId  = ta.value; refreshSubjectPreview(); }
    };
    ia.appendChild(ta);
    setTimeout(() => ta.focus(), 50);

  } else {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.min = 0; inp.placeholder = '0';
    inp.oninput = () => { pending = inp.value.trim(); nb.disabled = !pending; };
    ia.appendChild(inp);
    // Apply numeric default if defined
    if (q.defaultVal !== undefined) {
      setTimeout(() => { inp.value = q.defaultVal; pending = String(q.defaultVal); nb.disabled = false; inp.focus(); }, 50);
    } else {
      setTimeout(() => inp.focus(), 50);
    }
  }

  card.appendChild(ia);

  // Navigation row: back button (if not first question) + next button
  const navRow = document.createElement('div');
  navRow.style.cssText = 'display:flex;gap:10px;margin-top:20px;';

  if (cur > 0) {
    const bb = document.createElement('button');
    bb.style.cssText = 'flex:0 0 auto;padding:14px 18px;border:1px solid var(--border);border-radius:var(--border-radius-md);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;';
    bb.textContent = '← Back';
    bb.onmouseenter = () => { bb.style.borderColor = 'var(--border-strong)'; bb.style.color = 'var(--text)'; };
    bb.onmouseleave = () => { bb.style.borderColor = 'var(--border)'; bb.style.color = 'var(--muted)'; };
    bb.onclick = () => {
      // Remove last answer; if we jumped from Q4=No (cur===8 with 8 answers) undo the skip
      if (cur === 12 && answers[3] === 'No') {
        answers.splice(3); // remove Q4 answer and all N/A placeholders
        cur = 3;
      } else {
        answers.pop();
        cur--;
      }
      // Restore liveRef/liveId if going back to Q1 or Q2
      if (cur === 0) liveRef = answers[0] || '';
      if (cur === 1) liveId  = answers[1] || '';
      render();
    };
    navRow.appendChild(bb);
  }

  nb.style.marginTop = '0';
  nb.style.flex = '1';
  navRow.appendChild(nb);
  card.appendChild(navRow);
  left.appendChild(card);

  // RIGHT — subject preview + answers log
  const right = document.createElement('div');
  right.className = 'answers-panel';
  right.style.minHeight = '600px';  // keep layout stable between question renders

  // Subject card header row with copy link
  const subjectCard = document.createElement('div');
  subjectCard.style.cssText = 'background:var(--accent-light);border:1px solid var(--accent);border-radius:12px;padding:16px 18px;margin-bottom:10px;';

  const subjectHeaderRow = document.createElement('div');
  subjectHeaderRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';

  const subjectLabel = document.createElement('div');
  subjectLabel.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);font-weight:500;';
  subjectLabel.textContent = 'Email Subject Line Preview';

  const copyLink = document.createElement('a');
  copyLink.id = 'subject-copy-link';
  copyLink.href = '#';
  copyLink.style.cssText = 'font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;border:1px solid var(--accent);border-radius:6px;padding:3px 9px;transition:all 0.15s;display:none;';
  copyLink.textContent = 'Copy';
  copyLink.onclick = (e) => {
    e.preventDefault();
    const txt = subjectPlainText();
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(() => {
      copyLink.textContent = '✓ Copied!';
      copyLink.style.background = 'var(--accent)';
      copyLink.style.color = '#fff';
      setTimeout(() => { copyLink.textContent = 'Copy'; copyLink.style.background = ''; copyLink.style.color = 'var(--accent)'; }, 2000);
    });
  };

  subjectHeaderRow.appendChild(subjectLabel);
  subjectHeaderRow.appendChild(copyLink);
  subjectCard.appendChild(subjectHeaderRow);

  const subjectPreview = document.createElement('div');
  subjectPreview.id = 'subject-preview';
  subjectPreview.style.cssText = 'font-size:13px;min-height:22px;word-break:break-all;line-height:1.7;';
  subjectPreview.innerHTML = buildSubjectHTML();
  subjectCard.appendChild(subjectPreview);
  right.appendChild(subjectCard);

  // Show copy link if there's already content
  if (subjectPlainText().replace(/\[.*?\]/g,'').trim()) copyLink.style.display = 'inline';

  // ── Calculated fields — compiled below subject preview ─────────────────────
  const ap  = getAccessPassage();
  const ep  = getEmergencyPassage();
  const ppe = getPipeProtection();
  const assessText  = getAssessmentText();
  const minPassNote = getMinPassageNote();

  if (ap || ep || ppe || assessText || minPassNote) {
    const autoSection = document.createElement('div');
    autoSection.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:10px;';

    const autoLbl = document.createElement('div');
    autoLbl.className = 'panel-label';
    autoLbl.textContent = 'Calculated fields';
    autoSection.appendChild(autoLbl);

    if (ap)  autoSection.appendChild(makeAutoCard('#f0fdf4','#16a34a','#166534','#14532d','Access Passage', ap));
    if (ep)  autoSection.appendChild(makeAutoCard('#fff7ed','#ea580c','#9a3412','#7c2d12','Emergency Access Passage', ep));
    if (ppe) {
      const isAdv = ppe.startsWith('Seek');
      autoSection.appendChild(makeAutoCard(
        isAdv ? '#fef2f2' : '#eff6ff',
        isAdv ? '#dc2626' : '#2563eb',
        isAdv ? '#991b1b' : '#1e40af',
        isAdv ? '#7f1d1d' : '#1e3a8a',
        'Pipe Protection Envelope', ppe
      ));
    }

    if (assessText) {
      const isNA = assessText.startsWith('Design & siting is NOT');
      autoSection.appendChild(makeAutoCard(
        isNA ? '#fef2f2' : '#f0fdf4',
        isNA ? '#dc2626' : '#16a34a',
        isNA ? '#991b1b' : '#166534',
        isNA ? '#7f1d1d' : '#14532d',
        isNA ? '⚠ Assessment Outcome' : '✓ Assessment Outcome',
        assessText
      ));
    } else if (answers.length >= 10 && answers[9] && answers[9] !== 'N/A') {
      const pendCard = document.createElement('div');
      pendCard.style.cssText = 'background:#fafaf9;border:1px dashed var(--border);border-radius:10px;padding:10px 14px;';
      pendCard.innerHTML = '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--subtle);margin-bottom:4px;">Assessment Outcome</div><div style="font-size:11px;color:var(--subtle);">Answer Q11 to generate assessment...</div>';
      autoSection.appendChild(pendCard);
    }

    if (minPassNote) {
      autoSection.appendChild(makeAutoCard('#fff7ed','#ea580c','#9a3412','#7c2d12','⚠ Min Access Passage Not Provided', minPassNote));
    }

    right.appendChild(autoSection);
  }
  // ── Live cross-section diagram — below auto-calc, above answers ───────────
  if (sewerIsYes() && answers.length > 7 && answers[6] && answers[6] !== 'N/A') {
    const diagLbl = document.createElement('div');
    diagLbl.className = 'panel-label';
    diagLbl.style.cssText = 'margin-top:8px;margin-bottom:6px;';
    diagLbl.textContent = 'Cross-section preview';
    right.appendChild(diagLbl);

    // Save/copy buttons row
    const diagActRow = document.createElement('div');
    diagActRow.style.cssText = 'display:flex;gap:8px;margin-bottom:6px;';

    const saveBtn = document.createElement('a');
    saveBtn.href = '#';
    saveBtn.style.cssText = 'font-size:10px;color:var(--muted);text-decoration:none;font-weight:500;border:1px solid var(--border);border-radius:5px;padding:3px 9px;transition:all 0.15s;';
    saveBtn.textContent = '⬇ Save as JPG';
    saveBtn.onclick = (e) => {
      e.preventDefault();
      saveDiagramAsJPG('diagram-compact');
    };

    const copyImgBtn = document.createElement('a');
    copyImgBtn.href = '#';
    copyImgBtn.style.cssText = 'font-size:10px;color:var(--muted);text-decoration:none;font-weight:500;border:1px solid var(--border);border-radius:5px;padding:3px 9px;transition:all 0.15s;';
    copyImgBtn.textContent = '⎘ Copy image';
    copyImgBtn.onclick = (e) => {
      e.preventDefault();
      copyDiagramToClipboard('diagram-compact');
    };

    diagActRow.appendChild(saveBtn);
    diagActRow.appendChild(copyImgBtn);
    right.appendChild(diagActRow);

    const diagWrap = document.createElement('div');
    diagWrap.id = 'diagram-compact';
    diagWrap.style.cssText = 'background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;overflow:hidden;';
    diagWrap.innerHTML = buildCrossSectionSVG(true);
    right.appendChild(diagWrap);
  }

  // ── Answers section — collapsible, collapsed by default ────────────────────
  const answersWrap = document.createElement('div');
  answersWrap.style.cssText = 'margin-top:4px;';

  const answersToggleRow = document.createElement('div');
  answersToggleRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;user-select:none;';

  const panelLbl = document.createElement('div');
  panelLbl.className = 'panel-label';
  panelLbl.style.cssText = 'margin:0;';
  panelLbl.textContent = 'Your answers so far';

  const toggleIcon = document.createElement('span');
  toggleIcon.style.cssText = 'font-size:11px;color:var(--muted);transition:transform 0.2s;';
  toggleIcon.textContent = '▼';

  answersToggleRow.appendChild(panelLbl);
  answersToggleRow.appendChild(toggleIcon);

  const answersBody = document.createElement('div');
  answersBody.style.cssText = 'display:none;flex-direction:column;gap:6px;margin-top:6px;';  // collapsed by default

  answersToggleRow.onclick = () => {
    const isOpen = answersBody.style.display !== 'none';
    answersBody.style.display = isOpen ? 'none' : 'flex';
    toggleIcon.textContent = isOpen ? '▼' : '▲';
  };

  if (!answers.length) {
    const emp = document.createElement('div');
    emp.className = 'empty-panel';
    emp.textContent = 'Your answers will build up here as you go through each question.';
    answersBody.appendChild(emp);
  } else {
    answers.forEach((a, i) => {
      if (a === 'N/A') return;
      const d = document.createElement('div');
      d.className = 'answer-item';
      d.style.cssText = 'cursor:pointer;position:relative;transition:background 0.15s;border-radius:8px;';
      d.onmouseenter = () => d.style.background = 'var(--step-bg)';
      d.onmouseleave = () => d.style.background = '';
      d.innerHTML =
        '<div class="a-q">Q' + (i+1) + '. ' + QS[i].text.substring(0,45) + (QS[i].text.length>45?'...':'') + '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<div class="a-a">' + a + '</div>' +
          '<div style="font-size:10px;color:var(--accent);font-weight:500;padding-left:8px;white-space:nowrap;">Edit ›</div>' +
        '</div>';
      d.onclick = () => openInlineEdit(i);
      answersBody.appendChild(d);
    });
  }

  answersWrap.appendChild(answersToggleRow);
  answersWrap.appendChild(answersBody);
  right.appendChild(answersWrap);

  grid.appendChild(left);
  grid.appendChild(right);
  main.appendChild(grid);
}

function buildSummary() {
  const a = answers;
  const subject  = [a[0], a[2], a[1]].filter(Boolean).join(' ');
  const sewerYes = a[3] === 'Yes';
  const ap  = getAccessPassage();
  const ep  = getEmergencyPassage();
  const ppe = getPipeProtection();
  const lines = [];
  lines.push('CMP ASSESSMENT RECORD');
  lines.push('=====================');
  lines.push('Date/Time : ' + new Date().toLocaleString());
  lines.push('');
  lines.push('REFERENCE');
  lines.push('  CMP Ref         : ' + (a[0] || '—'));
  lines.push('  CMP ID          : ' + (a[1] || '—'));
  lines.push('  Comm Type       : ' + (a[2] || '—'));
  lines.push('  Subject Line    : ' + subject);
  lines.push('');
  lines.push('SEWER INFRASTRUCTURE');
  lines.push('  Infra present   : ' + (a[3] || '—'));
  if (sewerYes) {
    lines.push('  Manhole present : ' + (a[4] || '—'));
    lines.push('  Pipe diameter   : ' + (a[5] || '—') + ' mm');
    lines.push('  Pipe depth      : ' + (a[6] || '—') + ' m');
    lines.push('  Boundary offset : ' + (a[7] || '—') + ' m');
    lines.push('  Boundary loc.   : ' + (a[8] || '—'));
    lines.push('');
    lines.push('AUTO-CALCULATED');
    if (ap)  lines.push('  Access Passage            : ' + ap);
    if (ep)  lines.push('  Emergency Access Passage  : ' + ep);
    if (ppe) lines.push('  Pipe Protection Envelope  : ' + ppe);
  }
  return lines.join('\n');
}

function buildPrompt() {
  const a = answers;
  const subject  = [a[0], a[2], a[1]].filter(Boolean).join(' ');
  const sewerYes = a[3] === 'Yes';
  const ap  = getAccessPassage();
  const ep  = getEmergencyPassage();
  const ppe = getPipeProtection();

  let p = 'Write a formal professional email regarding a CMP (Construction Management Plan) sewer assessment with the following details:\n\n';
  p += 'SUBJECT: ' + subject + '\n';
  p += 'COMMUNICATION TYPE: ' + (a[2] || '') + '\n\n';
  p += '--- SITE / INFRASTRUCTURE DETAILS ---\n';
  p += 'CMP Reference: ' + (a[0] || '') + '\n';
  p += 'CMP ID: ' + (a[1] || '') + '\n';
  p += 'Sewer infrastructure within subject block: ' + (a[3] || '') + '\n';
  if (sewerYes) {
    p += 'Sewer manhole within subject block: ' + (a[4] || '') + '\n';
    p += 'Pipe diameter: ' + (a[5] || '') + 'mm\n';
    p += 'Approx. pipe depth: ' + (a[6] || '') + 'm\n';
    p += 'Sewer boundary offset: ' + (a[7] || '') + 'm\n';
    p += 'Asset boundary location: ' + (a[8] || '') + '\n';
    if (ap)  p += 'Access Passage required: ' + ap + '\n';
    if (ep)  p += 'Emergency Access Passage: ' + ep + '\n';
    if (ppe) p += 'Pipe Protection Envelope: ' + ppe + '\n';
  }
  p += '\nPlease draft a professional assessment notification email covering the above infrastructure details, any access or protection requirements identified, and request the recipient review and respond accordingly. Make it clear, concise and ready to send.';
  return p.trim();
}

function saveRecord() {
  try {
    const existing = JSON.parse(localStorage.getItem('cmp_records') || '[]');
    const rec = {
      id: Date.now(),
      date: new Date().toISOString(),
      cmpRef: answers[0] || '',
      cmpId:  answers[1] || '',
      commType: answers[2] || '',
      sewerInfra: answers[3] || '',
      manhole: answers[4] || '',
      pipeDiam: answers[5] || '',
      pipeDepth: answers[6] || '',
      offset: answers[7] || '',
      boundaryLoc: answers[8] || '',
      accessPassage: getAccessPassage() || '',
      emergencyPassage: getEmergencyPassage() || '',
      ppe: getPipeProtection() || '',
      summary: buildSummary()
    };
    existing.push(rec);
    localStorage.setItem('cmp_records', JSON.stringify(existing));
    return true;
  } catch(e) { return false; }
}

function getRecords() {
  try { return JSON.parse(localStorage.getItem('cmp_records') || '[]'); }
  catch(e) { return []; }
}
